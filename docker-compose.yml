services:
  registry:
    build:
      context: docker/registry
      args:
        REGISTRY_VERSION: "3"
    ports:
      - "${REGISTRY_HOST_PORT:-5000}:5000"
    volumes:
      - registry-data:/var/lib/registry
    environment:
      GC_ENABLED: "true"
      GC_TIME: "03:00"
      REGISTRY_HTTP_SECRET: "${REGISTRY_HTTP_SECRET:-changeme}"
      REGISTRY_CREDENTIALS: "${REGISTRY_CREDENTIALS}"
    restart: unless-stopped
    networks:
      - registry-net

  webui:
    build:
      context: .
      dockerfile: docker/webui/Dockerfile
    ports:
      - "5080:5080"
    environment:
      REGISTRY_URL: http://registry:5000
      REGISTRY_CREDENTIALS: "${REGISTRY_CREDENTIALS}"
    restart: unless-stopped
    depends_on:
      - registry
    networks:
      - registry-net

  cli:
    build:
      context: .
      dockerfile: docker/cli/Dockerfile
    environment:
      REGISTRY_URL: http://registry:5000
      REGISTRY_CREDENTIALS: "${REGISTRY_CREDENTIALS}"
    depends_on:
      - registry
    networks:
      - registry-net
    profiles:
      - cli

volumes:
  registry-data:

networks:
  registry-net:
    driver: bridge
